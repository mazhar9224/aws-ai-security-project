name: Deploy AI Security Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 210041661161.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push Docker image
        run: |
          cd backend
          docker buildx build --platform linux/amd64 --provenance=false -t ai-security-backend:latest .
          docker tag ai-security-backend:latest 210041661161.dkr.ecr.us-east-1.amazonaws.com/ai-security-backend:${{ github.sha }}
          docker push 210041661161.dkr.ecr.us-east-1.amazonaws.com/ai-security-backend:${{ github.sha }}

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name ai-security-backend \
            --image-uri 210041661161.dkr.ecr.us-east-1.amazonaws.com/ai-security-backend:${{ github.sha }} \
            --region us-east-1
